name: Python Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt
      - name: Tests ausfuehren
        run: pytest
