name: Multi Job Artifact

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ausgabe erzeugen
        run: cp message.txt output.txt
      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: output.txt

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Artifact herunterladen
        uses: actions/download-artifact@v4
        with:
          name: build-output
      - name: Inhalt anzeigen
        run: cat output.txt
